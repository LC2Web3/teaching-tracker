:root{--bg:#f0f2f5;--card:#fff;--primary:#1a73e8;--plite:#e8f0fe;

.hbtn{padding:6px 14px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;border-radius:6px;cursor:pointer;font-size:13px;transition:.2s}

.sc .n{font-size:26px;font-weight:700}

.sc.c-total .n{color:var(--primary)} .sc.c-todo .n{color:var(--todo)} .sc.c-doing .n{color:var(--doing)} .sc.c-done .n{color:var(--done)} .sc.c-overdue .n{color:var(--overdue)}

.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--done));border-radius:3px;transition:width .5s}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto}
.tab{padding:11px 20px;cursor:pointer;font-size:14px;color:var(--text2);border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}

.toolbar{display:flex;gap:10px;padding:14px 24px;flex-wrap:wrap;align-items:center}

.toolbar select:focus,.toolbar input:focus{border-color:var(--primary)}
.toolbar input{min-width:180px}
.fbtn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;transition:.2s}
.fbtn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.fbtn:hover{border-color:var(--primary)}
.btn{padding:7px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:.2s}
.btn-p{background:var(--primary);color:#fff} .btn-p:hover{background:#1557b0}
.btn-d{background:var(--overdue);color:#fff} .btn-d:hover{background:#c62828}
.content{padding:0 24px 24px}
.section{display:none} .section.active{display:block}

.mbadge{background:var(--primary);color:#fff;padding:2px 10px;border-radius:12px;font-size:13px}
.tc{background:var(--card);border-radius:8px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:flex-start;gap:12px;transition:.2s;border-left:4px solid transparent;cursor:pointer}
.tc:hover{box-shadow:var(--shadow2);transform:translateY(-1px)}
.tc.o-w{border-left-color:var(--wang)} .tc.o-d{border-left-color:var(--dong)} .tc.o-l{border-left-color:var(--li)} .tc.o-dean{border-left-color:var(--dean)}

.chk:hover{border-color:var(--done)}
.chk.c-done{background:var(--done);border-color:var(--done)}
.chk.c-done::after{content:'✓';color:#fff;font-size:12px}
.chk.c-doing{border-color:var(--doing)}
.chk.c-doing::after{content:'';width:8px;height:8px;background:var(--doing);border-radius:50%}
.tbody{flex:1;min-width:0}
.ttitle{font-size:14px;font-weight:500}
.ttitle.tx-done{text-decoration:line-through;color:var(--text3)}
.tmeta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
.tg{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap}
.tg-w{background:var(--wbg);color:var(--wang)} .tg-d{background:var(--dbg);color:var(--dong)} .tg-l{background:var(--lbg);color:var(--li)} .tg-dean{background:var(--deanbg);color:var(--dean)}
.tg-dept{background:#f5f5f5;color:var(--text2)}
.tg-s{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tg-s.s-todo{background:#f5f5f5;color:var(--todo)} .tg-s.s-doing{background:#fff3e0;color:var(--doing)} .tg-s.s-done{background:#e8f5e9;color:var(--done)} .tg-s.s-overdue{background:#ffebee;color:var(--overdue)}
.tg-p{font-size:11px;font-weight:600} .tg-p.p-high{color:var(--overdue)} .tg-p.p-low{color:var(--done)}
.tnote{font-size:12px;color:var(--text3);margin-top:4px}
.tdate{font-size:11px;color:var(--text3)} .tdate.warn{color:var(--overdue);font-weight:600}
.tact{display:flex;gap:4px;flex-shrink:0}
.tact button{background:#f5f5f5;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:12px;transition:.15s}

.kanban{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px}
.kcol{min-width:280px;flex:1;background:var(--card);border-radius:10px;box-shadow:var(--shadow)}

.kcol-h .kc{background:var(--bg);padding:2px 8px;border-radius:10px;font-size:12px}
.kcol-b{padding:8px;max-height:70vh;overflow-y:auto}
.kcard{background:var(--bg);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;border-left:3px solid transparent;transition:.15s;font-size:13px}

.kcard-t{font-weight:600;margin-bottom:6px}
.kcard-m{display:flex;gap:4px;flex-wrap:wrap}
.pcol{margin-bottom:20px}
.pcol-h{padding:12px 16px;border-radius:10px 10px 0 0;font-size:16px;font-weight:600;display:flex;justify-content:space-between;align-items:center}

.frow{display:flex;gap:12px} .frow .fg{flex:1}

.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:768px){

// ===== 登录系统 =====
var selectedRole='';
function selRole(btn,role){
  selectedRole=role;
  document.querySelectorAll('.login-btn').forEach(function(b){b.classList.remove('sel')});
  btn.classList.add('sel');
}
function doLogin(){
  var pin=document.getElementById('pinInput').value;
  if(pin!==ACCESS_PIN||!selectedRole){
    document.getElementById('loginErr').style.display='block';return;
  }
  currentUser=selectedRole;
  localStorage.setItem('watt_user',currentUser);
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('userBadge').textContent=currentUser;
  initFirebase();
}
function logout(){localStorage.removeItem('watt_user');location.reload();}

// 自动登录（如果之前登录过）
(function(){
  var u=localStorage.getItem('watt_user');
  if(u){
    currentUser=u;
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('mainApp').style.display='block';
    document.getElementById('userBadge').textContent=u;
    initFirebase();
  }
})();

// ===== Firebase 初始化 =====
function initFirebase(){
  try{
    firebase.initializeApp(firebaseConfig);
  }catch(e){}
  db=firebase.database();

  // 连接状态
  db.ref('.info/connected').on('value',function(s){
    var el=document.getElementById('syncStatus');
    el.innerHTML=s.val()?'🟢 已连接 · 实时同步':'🔴 离线';
  });

  // 监听数据变化（实时同步核心）
  db.ref('taskData').on('value',function(snapshot){
    var str=snapshot.val();
    if(str){
      try{
        tasks=JSON.parse(str);
        tasks.forEach(function(t){if(!t.notes)t.notes=[];});
        nextId=Math.max.apply(null,tasks.map(function(t){return t.id}))+1;
      }catch(e){tasks=clone(TASKS);}
    }else{
      // 首次使用，写入默认数据
      tasks=clone(TASKS);
      save();return;
    }
    if(!isModalOpen)render();
  });
}

// ===== 保存到 Firebase（带防抖）=====
var saveTimer=null;
function save(){
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    if(db){
      db.ref('taskData').set(JSON.stringify(tasks));
      db.ref('meta').set({user:currentUser,time:firebase.database.ServerValue.TIMESTAMP});
    }
  },300);
}

// ===== 筛选 =====
function getFiltered(){
  var fm=document.getElementById('fMonth').value;
  var fs=document.getElementById('fStatus').value;
  var fq=(document.getElementById('fSearch').value||'').toLowerCase();
  return tasks.filter(function(t){
    if(curOwner!=='all'&&t.owner!==curOwner)return false;
    if(fm!=='all'&&t.month!==fm)return false;
    if(fs!=='all'&&t.status!==fs)return false;
    if(fq&&t.name.toLowerCase().indexOf(fq)<0&&(t.note||'').toLowerCase().indexOf(fq)<0&&(t.dept||'').toLowerCase().indexOf(fq)<0)return false;
    return true;
  });
}

function oCls(o){return o==='王德芳'?'o-w':o==='董晓娜'?'o-d':o==='李巍巍'?'o-l':'o-dean';}
function oTag(o){return o==='王德芳'?'tg-w':o==='董晓娜'?'tg-d':o==='李巍巍'?'tg-l':'tg-dean';}
function sCls(s){return 's-'+s;}
function cCls(s){return s==='done'?'c-done':s==='doing'?'c-doing':'';}
function dWarn(d,s){
  if(!d||s==='done')return'';
  var diff=(new Date(d)-new Date())/(864e5);
  if(diff<0)return' <span class="tdate warn">⚠️逾期'+Math.abs(Math.floor(diff))+'天</span>';
  if(diff<7)return' <span class="tdate" style="color:var(--doing);font-weight:600">⏰剩'+Math.floor(diff)+'天</span>';
  return'';
}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000);}

// ===== 统计 =====
function renderStats(){
  var all=tasks.length,todo=0,doing=0,done=0,over=0;
  tasks.forEach(function(t){
    if(t.status==='done')done++;
    else if(t.status==='doing')doing++;
    else{if(t.deadline&&new Date(t.deadline)<new Date())over++;else todo++;}
  });
  var pct=all?Math.round(done/all*100):0;
  document.getElementById('statsBar').innerHTML=
    '<div class="sc c-total"><div class="n">'+all+'</div><div class="l">总任务</div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="l" style="margin-top:4px">完成率 '+pct+'%</div></div>'+
    '<div class="sc c-todo"><div class="n">'+todo+'</div><div class="l">待启动</div></div>'+
    '<div class="sc c-doing"><div class="n">'+doing+'</div><div class="l">进行中</div></div>'+
    '<div class="sc c-done"><div class="n">'+done+'</div><div class="l">已完成</div></div>'+
    '<div class="sc c-overdue"><div class="n">'+over+'</div><div class="l">⚠️逾期</div></div>';
}

// ===== 任务卡片 =====
function tHTML(t){
  var tc=cCls(t.status),oc=oCls(t.owner),ot=oTag(t.owner);
  var titC=t.status==='done'?'ttitle tx-done':'ttitle';
  var pC=t.priority==='high'?'tg-p p-high':t.priority==='low'?'tg-p p-low':'tg-p';
  var ds=t.deadline?'<span class="tdate">📅'+fmtDate(t.deadline)+'</span>':'';
  return '<div class="tc '+oc+'" onclick="openDt('+t.id+')">'+
    '<div class="chk '+tc+'" onclick="event.stopPropagation();togS('+t.id+')"></div>'+
    '<div class="tbody"><div class="'+titC+'">'+t.name+'</div><div class="tmeta">'+
    '<span class="tg '+ot+'">'+t.owner+'</span>'+
    (t.dept?'<span class="tg tg-dept">'+t.dept+'</span>':'')+
    '<span class="tg-s '+sCls(t.status)+'">'+SN[t.status]+'</span>'+
    '<span class="'+pC+'">'+PN[t.priority]+'</span>'+ds+dWarn(t.deadline,t.status)+
    '</div>'+(t.note?'<div class="tnote">💡 '+t.note+'</div>':'')+'</div>'+
    '<div class="tact"><button onclick="event.stopPropagation();openEdit('+t.id+')">✏️</button>'+
    '<button onclick="event.stopPropagation();cycS('+t.id+')">🔄</button></div></div>';
}

// ===== 列表视图 =====
function renderList(){
  var f=getFiltered(),ms=['2','3','4','5','6','7','0'],h='';
  ms.forEach(function(m){
    var mt=f.filter(function(t){return t.month===m});
    if(!mt.length)return;
    var dc=mt.filter(function(t){return t.status==='done'}).length;
    h+='<div class="month-hdr"><span class="mbadge">'+MN[m]+'</span><span class="mcount" style="font-size:12px;color:var(--text3);font-weight:400">'+mt.length+'项·完成'+dc+'</span></div>';
    mt.forEach(function(t){h+=tHTML(t)});
  });
  document.getElementById('sec-list').innerHTML=h||'<div style="text-align:center;padding:60px;color:var(--text3)">🔍 没有匹配的任务</div>';
}

// ===== 看板视图 =====
function renderKanban(){
  var f=getFiltered(),cols=[{k:'todo',l:'📋 待启动',c:'var(--todo)'},{k:'doing',l:'🔧 进行中',c:'var(--doing)'},{k:'done',l:'✅ 已完成',c:'var(--done)'}];
  var h='<div class="kanban">';
  cols.forEach(function(c){
    var ct=f.filter(function(t){return t.status===c.k});
    h+='<div class="kcol"><div class="kcol-h" style="border-bottom-color:'+c.c+'"><span>'+c.l+'</span><span class="kc">'+ct.length+'</span></div><div class="kcol-b">';
    ct.forEach(function(t){
      h+='<div class="kcard '+oCls(t.owner)+'" onclick="openDt('+t.id+')"><div class="kcard-t">'+t.name+'</div><div class="kcard-m"><span class="tg '+oTag(t.owner)+'">'+t.owner+'</span><span class="tg tg-dept">'+MN[t.month].replace(/[📖🔥📋🎓🏆📦🔄]\s?/,'')+'</span>'+(t.priority==='high'?'<span class="tg-p p-high">🔴高</span>':'')+'</div></div>';
    });
    h+='</div></div>';
  });
  document.getElementById('sec-kanban').innerHTML=h+'</div>';
}

// ===== 按负责人视图 =====
function renderPerson(){
  var f=getFiltered(),ps=[{n:'王德芳',c:'pw',i:'🔵'},{n:'董晓娜',c:'pd',i:'🟢'},{n:'李巍巍',c:'pl',i:'🟠'},{n:'李  超',c:'pp',i:'🟣'}],h='';
  ps.forEach(function(p){
    var pt=f.filter(function(t){return t.owner===p.n});
    if(!pt.length)return;
    var dc=pt.filter(function(t){return t.status==='done'}).length;
    var pct=pt.length?Math.round(dc/pt.length*100):0;
    h+='<div class="pcol"><div class="pcol-h '+p.c+'"><span>'+p.i+' '+p.n+' （'+pt.length+'项）</span><span>完成 '+dc+'/'+pt.length+' ('+pct+'%)</span></div><div class="pcol-b">';
    pt.forEach(function(t){h+=tHTML(t)});
    h+='</div></div>';
  });
  document.getElementById('sec-person').innerHTML=h||'<div style="text-align:center;padding:60px;color:var(--text3)">没有匹配的任务</div>';
}

function render(){renderStats();renderList();renderKanban();renderPerson();}

// ===== Tab/筛选 =====
function switchTab(tab,el){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});
  document.getElementById('sec-'+tab).classList.add('active');
}
function setOwner(o,el){
  curOwner=o;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');render();
}

// ===== 状态 =====
function togS(id){
  var t=tasks.find(function(x){return x.id===id});if(!t)return;
  t.status=t.status==='done'?'todo':'done';
  save();render();toast(t.status==='done'?'✅ 完成':'↩️ 恢复');
}
function cycS(id){
  var t=tasks.find(function(x){return x.id===id});if(!t)return;
  var o=['todo','doing','done'],i=o.indexOf(t.status);
  t.status=o[(i+1)%3];save();render();toast('状态: '+SN[t.status]);
}

// ===== 新增/编辑弹窗 =====
function openAdd(){
  document.getElementById('eId').value='';
  document.getElementById('eName').value='';
  document.getElementById('eOwner').value='王德芳';
  document.getElementById('eMonth').value='3';
  document.getElementById('ePriority').value='medium';
  document.getElementById('eStatus').value='todo';
  document.getElementById('eDeadline').value='';
  document.getElementById('eDept').value='';
  document.getElementById('eNote').value='';
  document.getElementById('editTitle').textContent='新增任务';
  document.getElementById('delBtn').style.display='none';
  document.getElementById('editModal').classList.add('show');
  isModalOpen=true;
}
function openEdit(id){
  var t=tasks.find(function(x){return x.id===id});if(!t)return;
  document.getElementById('eId').value=t.id;
  document.getElementById('eName').value=t.name;
  document.getElementById('eOwner').value=t.owner;
  document.getElementById('eMonth').value=t.month;
  document.getElementById('ePriority').value=t.priority;
  document.getElementById('eStatus').value=t.status;
  document.getElementById('eDeadline').value=t.deadline||'';
  document.getElementById('eDept').value=t.dept||'';
  document.getElementById('eNote').value=t.note||'';
  document.getElementById('editTitle').textContent='编辑任务';
  document.getElementById('delBtn').style.display='inline-block';
  document.getElementById('editModal').classList.add('show');
  isModalOpen=true;
}
function closeEdit(){document.getElementById('editModal').classList.remove('show');isModalOpen=false;render();}

function saveTask(){
  var name=document.getElementById('eName').value.trim();
  if(!name){alert('请输入任务名称');return;}
  var idVal=document.getElementById('eId').value;
  var data={name:name,owner:document.getElementById('eOwner').value,month:document.getElementById('eMonth').value,
    priority:document.getElementById('ePriority').value,status:document.getElementById('eStatus').value,
    deadline:document.getElementById('eDeadline').value,dept:document.getElementById('eDept').value.trim(),
    note:document.getElementById('eNote').value.trim()};
  if(idVal){
    var t=tasks.find(function(x){return x.id===parseInt(idVal)});
    if(t)Object.assign(t,data);
  }else{data.id=nextId++;data.notes=[];tasks.push(data);}
  save();closeEdit();toast(idVal?'✅ 已更新':'✅ 已添加');
}
function delTask(){
  var idVal=parseInt(document.getElementById('eId').value);
  if(!confirm('确定删除？'))return;
  tasks=tasks.filter(function(t){return t.id!==idVal});
  save();closeEdit();toast('🗑️ 已删除');
}

// ===== 详情弹窗 =====
function openDt(id){
  var t=tasks.find(function(x){return x.id===id});if(!t)return;
  dtId=id;isModalOpen=true;
  document.getElementById('dtTitle').textContent=t.name;
  var h='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">'+
    '<span class="tg '+oTag(t.owner)+'">'+t.owner+'</span>'+
    '<span class="tg-s '+sCls(t.status)+'">'+SN[t.status]+'</span>'+
    '<span class="tg tg-dept">'+MN[t.month].replace(/[📖🔥📋🎓🏆📦🔄]\s?/,'')+'</span>'+
    '<span class="tg-p '+(t.priority==='high'?'p-high':'')+'">'+PN[t.priority]+'</span></div>';
  if(t.dept)h+='<div style="font-size:13px;margin-bottom:6px"><b>对接单位：</b>'+t.dept+'</div>';
  if(t.deadline)h+='<div style="font-size:13px;margin-bottom:6px"><b>截止：</b>'+t.deadline+dWarn(t.deadline,t.status)+'</div>';
  if(t.note)h+='<div style="font-size:13px;margin-bottom:6px"><b>备注：</b>'+t.note+'</div>';
  document.getElementById('dtBody').innerHTML=h;
  rNotes(t);
  document.getElementById('detailModal').classList.add('show');
}
function closeDt(){document.getElementById('detailModal').classList.remove('show');isModalOpen=false;dtId=null;render();}
function editFromDt(){var id=dtId;closeDt();if(id)openEdit(id);}

// ===== 跟进记录 =====
function rNotes(t){
  var h='';
  if(t.notes&&t.notes.length){
    t.notes.forEach(function(n,i){
      h+='<div class="note-item"><div>'+n.text+'</div><div class="nd">'+n.date+(n.user?' · '+n.user:'')+' <span style="cursor:pointer" onclick="dNote('+t.id+','+i+')">✕</span></div></div>';
    });
  }else h='<div style="font-size:12px;color:var(--text3);padding:8px">暂无记录</div>';
  document.getElementById('dtNotes').innerHTML=h;
}
function addNote(){
  var t=tasks.find(function(x){return x.id===dtId});if(!t)return;
  var inp=document.getElementById('noteIn'),text=inp.value.trim();if(!text)return;
  if(!t.notes)t.notes=[];
  var now=new Date();
  var ds=now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate()+' '+now.getHours()+':'+String(now.getMinutes()).replace(/^(\d)$/,'0$1');
  t.notes.push({text:text,date:ds,user:currentUser});
  inp.value='';save();rNotes(t);toast('📝 已添加');
}
function dNote(tid,idx){
  var t=tasks.find(function(x){return x.id===tid});
  if(!t||!t.notes)return;t.notes.splice(idx,1);save();rNotes(t);
}

// ===== 导出/导入/重置 =====
function exportJSON(){
  var blob=new Blob([JSON.stringify(tasks,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='tasks_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('📤 已导出');
}
function importJSON(e){
  var file=e.target.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{tasks=JSON.parse(ev.target.result);nextId=Math.max.apply(null,tasks.map(function(t){return t.id}))+1;save();render();toast('📥 导入成功');}
    catch(err){alert('文件格式错误');}
  };r.readAsText(file);e.target.value='';
}
function resetAll(){
  if(!confirm('确定重置为初始数据？所有修改将丢失！'))return;
  tasks=clone(TASKS);save();render();toast('🔄 已重置');
}
</script>
</body>
